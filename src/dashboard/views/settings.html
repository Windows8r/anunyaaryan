<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Naura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Custom Toggle Switch CSS */
        .toggle-checkbox:checked { right: 0; border-color: #ec4899; }
        .toggle-checkbox:checked + .toggle-label { background-color: #ec4899; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #4b5563; transition: all 0.3s; }
        .toggle-label { width: 3rem; height: 1.5rem; background-color: #4b5563; border-radius: 9999px; transition: all 0.3s; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center animate-fade-in-down">
    <div class="w-full max-w-xl glass-card rounded-3xl p-8 md:p-10 border border-pink-500/20 shadow-[0_0_40px_rgba(236,72,153,0.1)]">
        
        <!-- Header Settings -->
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/10">
            <h1 class="text-3xl font-bold text-white"><i class="fa-solid fa-sliders text-pink-500 mr-3"></i>System Config</h1>
            <a href="/" class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></a>
        </div>

        <!-- Alert Notification (Sembunyi by default) -->
        <div id="alertBox" class="hidden mb-6 p-4 rounded-xl font-bold text-sm flex items-center gap-3 transition-all"></div>
        
        <!-- Form Pengaturan -->
        <form id="settingsForm" class="space-y-6">
            
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-white/5">
                <label class="block text-gray-300 font-semibold mb-2 text-sm"><i class="fa-solid fa-hashtag mr-2 text-gray-500"></i>Guild ID (Server Target)</label>
                <input type="text" id="guildId" required class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition" placeholder="Contoh: 123456789012345678">
            </div>
            
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-white/5">
                <label class="block text-gray-300 font-semibold mb-2 text-sm"><i class="fa-solid fa-keyboard mr-2 text-gray-500"></i>Custom Prefix</label>
                <input type="text" id="prefix" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition" placeholder="Default: n!">
            </div>

            <!-- Toggle Switch 1 -->
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-white/5 flex items-center justify-between">
                <div>
                    <p class="text-white font-bold"><i class="fa-solid fa-robot text-purple-400 mr-2"></i>AI Auto-Moderation</p>
                    <p class="text-xs text-gray-500 mt-1">Filter kata kasar & perlindungan spam</p>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="automod" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="automod" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- Toggle Switch 2 -->
            <div class="bg-gray-900/50 p-5 rounded-2xl border border-white/5 flex items-center justify-between">
                <div>
                    <p class="text-white font-bold"><i class="fa-solid fa-headphones text-blue-400 mr-2"></i>24/7 Music Mode</p>
                    <p class="text-xs text-gray-500 mt-1">Bot tidak akan keluar dari Voice Channel</p>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="twentyFourSeven" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="twentyFourSeven" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-4 px-4 rounded-2xl shadow-[0_5px_20px_rgba(236,72,153,0.3)] transition transform hover:-translate-y-1 mt-4">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Deploy Settings
            </button>
        </form>
    </div>

    <!-- Script Pengirim Data -->
    <script>
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Mencegah halaman reload
            
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            
            // Animasi tombol loading
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Menyimpan...';
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            
            const payload = {
                guildId: document.getElementById('guildId').value,
                prefix: document.getElementById('prefix').value,
                automod: document.getElementById('automod').checked ? 'true' : 'false',
                twentyFourSeven: document.getElementById('twentyFourSeven').checked ? 'true' : 'false'
            };

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                // Tampilkan notifikasi
                alertBox.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'border-red-500/50');
                alertBox.classList.add('bg-emerald-500/20', 'text-emerald-400', 'border', 'border-emerald-500/50');
                alertBox.innerHTML = '<i class="fa-solid fa-check-circle text-xl"></i> ' + (result.message || 'Pengaturan berhasil disimpan!');
                
            } catch (err) {
                alertBox.classList.remove('hidden', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/50');
                alertBox.classList.add('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/50');
                alertBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-xl"></i> Gagal menyimpan pengaturan sistem.';
            } finally {
                // Kembalikan tombol ke keadaan semula
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> Deploy Settings';
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
